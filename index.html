<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI-TOUCH GAME</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020617; font-family: sans-serif; }
        #game-wrapper-fullscreen { width: 100%; height: 100vh; position: relative; }
        #heli-touch { position: relative; width: 100%; height: 100%; background: #020617; overflow: hidden; touch-action: none; user-select: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Hiệu ứng Popup Sao */
        @keyframes starFade {
            0% { transform: scale(0.5) translate(-50%, -50%); opacity: 0; }
            20% { transform: scale(1.2) translate(-50%, -50%); opacity: 1; }
            80% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
            100% { transform: scale(1.5) translate(-50%, -50%); opacity: 0; }
        }
        .star-popup {
            position: absolute; top: 40%; left: 50%; transform-origin: 0 0;
            font-size: 70px; pointer-events: none; z-index: 200;
            animation: starFade 3s forwards;
        }

        @keyframes blink { 50% { opacity: 0; } }
        :-webkit-full-screen #skyGame { width: 100vw; height: 100vh; }
        :fullscreen #skyGame { width: 100vw; height: 100vh; }
        .btn-hover { transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-hover:active { transform: scale(0.92); filter: brightness(1.2); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
 </head>
<body>
<div id='leaderboard-sidebar'>
    <div class='lb-title'>TOP 100 THẾ GIỚI</div>
    <div id='leaderboard-list'>Đang tải...</div>
</div>  
    
<div id='game-wrapper-fullscreen'>
    <div id='heli-touch'>
        <canvas id='skyGame'></canvas>
        <div id="star-layer"></div> <div id='ui-layer' style='position: absolute; top: 10px; left: 0; color: white; pointer-events: none; z-index: 50; text-align: center; width: 100%;'>
            <div style='font-size: 11px; opacity: 0.8; letter-spacing: 1px;'><span id='best-label'>KỶ LỤC</span>: <span id='best-val' style='color: #22c55e;'>0m</span></div>
            <div id='ingame-best-msg' style='display: none; color: #22c55e; font-weight: bold; font-size: 14px; margin-top: 5px; animation: blink 0.5s infinite;'></div>
            <div id='score-val' style='font-size: 28px; font-weight: 900; color: #facc15; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); line-height: 1.2;'>0m</div>
            <div id='warning-text' style='color: #22d3ee; font-size: 13px; font-weight: bold; display: none; text-shadow: 1px 1px 2px #000; margin-top: 2px;'>⚠️ RADAR DETECTED!</div>
        </div>

        <div id='entry-screen' style='position: absolute; inset: 0; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white;'>
           <img src="Chinook-home.png" alt="Logo Máy Bay" style="width: 220px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));"/>
            <h2 id='main-title' style='color: #facc15; margin-bottom: 10px; letter-spacing: 2px; text-align:center;'>HELI TOUCH VER 16</h2>
            <div style='margin-bottom: 25px; display: flex; gap: 15px;'>
                <div id='lang-vi' class="btn-hover" style='cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid #3b82f6;'>
                    <img src='https://flagcdn.com/w80/vn.png' style='display: block; width: 45px; height: 30px; object-fit: cover; pointer-events: none;' alt='VN'/>
                </div>
                <div id='lang-en' class="btn-hover" style='cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid transparent; opacity: 0.5;'>
                    <img src='https://flagcdn.com/w80/us.png' style='display: block; width: 45px; height: 30px; object-fit: cover; pointer-events: none;' alt='EN'/>
                </div>
            </div>
            <button id='enter-fs-btn' class="btn-hover" style='padding: 18px 45px; font-size: 18px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 50px; font-weight: bold;'>VÀO CHƠI</button>
            <p id='rotate-hint' style='margin-top: 15px; font-size: 12px; opacity: 0.6;'>Nên xoay ngang điện thoại để trải nghiệm tốt nhất</p>
        </div>

        <div id='start-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 90; color: white;'>
            <button id='ready-btn' class="btn-hover" style='padding: 20px 60px; font-size: 24px; cursor: pointer; background: #22c55e; color: white; border-radius: 50px; border:none; font-weight: bold;'>BẮT ĐẦU NGAY</button>
            <p id='fly-hint' style='margin-top: 10px;'>Chạm và giữ để bay lên!</p>
        </div>

        <div id='over-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 110; color: white;'>
            <h2 id='fail-title' style='color: #ef4444; margin-bottom: 5px;'>KẾT THÚC</h2>

 <div id='score-input-container'>
    <input id='player-name' maxlength='15' placeholder='Nhập tên...' type='text' style="pointer-events: auto;"    onmousedown="event.stopPropagation();" 
           ontouchstart="event.stopPropagation();"/>
    <button id='submit-score-btn'   onmousedown="event.stopPropagation();"     ontouchstart="event.stopPropagation();">LƯU ĐIỂM</button>
</div>
            <div id='final-score' style='font-size: 36px; font-weight: bold; margin-bottom: 10px; color: #facc15;'>0m</div>
            
            <div id="star-results" style="margin-bottom: 20px; display: flex; gap: 20px; font-size: 20px; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 15px;">
    <div style="color: #ffffff;">★ <span id="count-white" style="color: white;">0</span></div>
    <div style="color: #facc15;">★ <span id="count-yellow" style="color: white;">0</span></div>
    <div style="color: #ef4444;">🌟 <span id="count-red" style="color: white;">0</span></div>
</div>

            <div style='display: flex; gap: 15px;'>
                <button id='retry-btn' class="btn-hover" style='padding: 12px 30px; background: #22c55e; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>CHƠI LẠI</button>
                <button id='exit-btn' class="btn-hover" style='padding: 12px 30px; background: #64748b; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>THOÁT</button>
            </div>
        </div>
    </div>
</div>

<style>
    /* Khung bảng xếp hạng bên phải */
    #leaderboard-sidebar {
        position: fixed;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 180px;
        max-height: 70vh;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        border: 2px solid #ffcc00;
        border-radius: 10px;
        padding: 10px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        z-index: 9999;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
    }
    .lb-title {
        text-align: center;
        font-weight: bold;
        color: #ffcc00;
        font-size: 14px;
        margin-bottom: 10px;
        border-bottom: 1px solid #444;
        padding-bottom: 5px;
    }
    #leaderboard-list {
        overflow-y: auto;
        flex-grow: 1;
    }
    .lb-entry {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        padding: 5px 0;
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .lb-rank { color: #ffcc00; width: 20px; font-weight: bold; }
    .lb-name { flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 5px; }
    .lb-score { color: #00ffcc; }

    /* Ô nhập tên ở màn hình kết quả */
  #over-screen {
    z-index: 200000 !important;
}

#score-input-container {
    position: relative;
    z-index: 300000 !important;
    pointer-events: auto !important;
}

#player-name {
    position: relative;
    z-index: 400000 !important;
    pointer-events: auto !important;
    -webkit-user-select: text; /* Cho phép chọn văn bản trên iOS */
    user-select: text;
    background-color: blue !important; /* Đổi màu nền để dễ nhận biết đã chạm hay chưa */
    color: black !important;
}
    
    #submit-score-btn {
        padding: 8px 12px;
        background: #ffcc00;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
        
           }
    #submit-score-btn:disabled { background: #888; cursor: not-allowed; }

    /* Ẩn trên màn hình nhỏ để không che game */
    @media (max-width: 600px) {
        #leaderboard-sidebar { display: none; }
    }
</style>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
//<![CDATA[
  // 1. Cấu hình Firebase
  const firebaseConfig = {
    databaseURL: "https://heli-best-score-default-rtdb.asia-southeast1.firebasedatabase.app",
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // 2. Hàm gửi điểm (Gắn trực tiếp vào window để file game.js có thể gọi được)
  window.submitScore = function() {
    const nameInput = document.getElementById('player-name');
    const btn = document.getElementById('submit-score-btn');
    
    // Lấy điểm từ biến globalScore chúng ta vừa đẩy ra ở Bước 1
    let finalScore = window.globalScore || 0;
    const name = nameInput.value.trim();
    
    if (!name) {
        alert("Bạn chưa nhập tên!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "ĐANG TÍNH TOÁN...";

    // 1. Gửi điểm lên Firebase
    const newScoreRef = database.ref('leaderboard').push();
    newScoreRef.set({
        name: name,
        score: Math.floor(finalScore),
        timestamp: Date.now()
    })
    .then(() => {
        // 2. Lấy toàn bộ dữ liệu để tính thứ hạng thực tế
        database.ref('leaderboard').once('value', (snapshot) => {
            let allScores = [];
            snapshot.forEach((child) => {
                allScores.push(child.val().score);
            });

            // Sắp xếp điểm giảm dần
            allScores.sort((a, b) => b - a);

            // Tìm thứ hạng (vị trí đầu tiên tìm thấy điểm này + 1)
            const rank = allScores.indexOf(Math.floor(finalScore)) + 1;

            // 3. Thông báo kết quả cho người chơi
            if (rank <= 100) {
                alert(`TUYỆT VỜI! Bạn đứng thứ ${rank} trên Bảng xếp hạng thế giới!`);
            } else {
                alert(`Bạn xếp hạng thứ ${rank}. Hãy cố gắng thêm chút nữa để lọt vào Top 100 nhé!`);
            }

            // Cập nhật giao diện nút bấm
            btn.innerText = "ĐÃ LƯU (Hạng " + rank + ")";
            nameInput.disabled = true;
            
            // Cập nhật lại bảng Sidebar bên phải
            if (typeof loadLeaderboard === "function") loadLeaderboard();
        });
    })
    .catch((err) => {
        alert("Lỗi: " + err.message);
        btn.disabled = false;
        btn.innerText = "THỬ LẠI";
    });
}

  // 3. Hàm load bảng xếp hạng
  function loadLeaderboard() {
    const leaderboardRef = database.ref('leaderboard').orderByChild('score').limitToLast(100);
    leaderboardRef.on('value', (snapshot) => {
        let data = [];
        snapshot.forEach((child) => { data.push(child.val()); });
        data.sort((a, b) => b.score - a.score);
        
        let html = '';
        data.forEach((entry, index) => {
            let displayName = entry.name.length > 12 ? entry.name.substring(0, 10) + '..' : entry.name;
            html += `
                <div class='lb-entry'>
                    <span class='lb-rank'>${index + 1}.</span>
                    <span class='lb-name'>${displayName}</span>
                    <span class='lb-score'>${Math.floor(entry.score)}m</span>
                </div>`;
        });
        const listDiv = document.getElementById('leaderboard-list');
        if(listDiv) listDiv.innerHTML = html || "<div style='text-align:center;font-size:10px;'>Chưa có dữ liệu</div>";
    });
  }

  // Khởi chạy khi trang sẵn sàng
  document.addEventListener('DOMContentLoaded', () => {
    loadLeaderboard();
    const submitBtn = document.getElementById('submit-score-btn');
if(submitBtn) {
    submitBtn.onclick = window.submitScore;
    submitBtn.ontouchend = (e) => {
        e.preventDefault();
        window.submitScore();
    };
}
  });
//]]>
</script>    
   
</body>
</html>
