<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI-TOUCH GAME</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020617; font-family: sans-serif; }
        #game-wrapper-fullscreen { width: 100%; height: 100vh; position: relative; }
        #heli-touch { position: relative; width: 100%; height: 100%; background: #020617; overflow: hidden; touch-action: none; user-select: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Hiệu ứng Popup Sao */
        @keyframes starFade {
            0% { transform: scale(0.5) translate(-50%, -50%); opacity: 0; }
            20% { transform: scale(1.2) translate(-50%, -50%); opacity: 1; }
            80% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
            100% { transform: scale(1.5) translate(-50%, -50%); opacity: 0; }
        }
        .star-popup {
            position: absolute; top: 40%; left: 50%; transform-origin: 0 0;
            font-size: 70px; pointer-events: none; z-index: 200;
            animation: starFade 3s forwards;
        }

        @keyframes blink { 50% { opacity: 0; } }
        :-webkit-full-screen #skyGame { width: 100vw; height: 100vh; }
        :fullscreen #skyGame { width: 100vw; height: 100vh; }
        .btn-hover { transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-hover:active { transform: scale(0.92); filter: brightness(1.2); }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

<div id='game-wrapper-fullscreen'>
    <div id='heli-touch'>
        <canvas id='skyGame'></canvas>
        <div id="star-layer"></div> <div id='ui-layer' style='position: absolute; top: 10px; left: 0; color: white; pointer-events: none; z-index: 50; text-align: center; width: 100%;'>
            <div style='font-size: 11px; opacity: 0.8; letter-spacing: 1px;'><span id='best-label'>KỶ LỤC</span>: <span id='best-val' style='color: #22c55e;'>0m</span></div>
            <div id='ingame-best-msg' style='display: none; color: #22c55e; font-weight: bold; font-size: 14px; margin-top: 5px; animation: blink 0.5s infinite;'></div>
            <div id='score-val' style='font-size: 28px; font-weight: 900; color: #facc15; text-shadow: 2px 2px 4px rgba(0,0,0,0.7); line-height: 1.2;'>0m</div>
            <div id='warning-text' style='color: #22d3ee; font-size: 13px; font-weight: bold; display: none; text-shadow: 1px 1px 2px #000; margin-top: 2px;'>⚠️ RADAR DETECTED!</div>
        </div>

        <div id='entry-screen' style='position: absolute; inset: 0; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white;'>
           <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhl2bRzH-hqoUjuHonuc2ls2zrJOsDC_RfmcYe5RzPHMCpPgF-O-a_Df5gUPqHYC44JSVKd41zOZWnOjTwLF40DK52YjNOxis2ZR27HLP_lucy9tX01nXlF1HO9DCuBXCDkiFMwvdzKP7G6J5oYZvoUoW5rTVwz1B2BjNLs8vpqFh1N1fJJpd8khIHDRhU/w400-h206/m%C3%A1y%20bay%20Chinook%201%20PNG.png" alt="Logo Máy Bay" style="width: 220px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));"/>
            <h2 id='main-title' style='color: #facc15; margin-bottom: 10px; letter-spacing: 2px; text-align:center;'>HELI TOUCH VER 16</h2>
            <div style='margin-bottom: 25px; display: flex; gap: 15px;'>
                <div id='lang-vi' class="btn-hover" style='cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid #3b82f6;'>
                    <img src='https://flagcdn.com/w80/vn.png' style='display: block; width: 45px; height: 30px; object-fit: cover; pointer-events: none;' alt='VN'/>
                </div>
                <div id='lang-en' class="btn-hover" style='cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid transparent; opacity: 0.5;'>
                    <img src='https://flagcdn.com/w80/us.png' style='display: block; width: 45px; height: 30px; object-fit: cover; pointer-events: none;' alt='EN'/>
                </div>
            </div>
            <button id='enter-fs-btn' class="btn-hover" style='padding: 18px 45px; font-size: 18px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 50px; font-weight: bold;'>VÀO TOÀN MÀN HÌNH</button>
            <p id='rotate-hint' style='margin-top: 15px; font-size: 12px; opacity: 0.6;'>Nên xoay ngang điện thoại để trải nghiệm tốt nhất</p>
        </div>

        <div id='start-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 90; color: white;'>
            <button id='ready-btn' class="btn-hover" style='padding: 20px 60px; font-size: 24px; cursor: pointer; background: #22c55e; color: white; border-radius: 50px; border:none; font-weight: bold;'>BẮT ĐẦU NGAY</button>
            <p id='fly-hint' style='margin-top: 10px;'>Chạm và giữ để bay lên!</p>
        </div>

        <div id='over-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 110; color: white;'>
            <h2 id='fail-title' style='color: #ef4444; margin-bottom: 5px;'>KẾT THÚC</h2>
            <div id='final-score' style='font-size: 36px; font-weight: bold; margin-bottom: 10px; color: #facc15;'>0m</div>
            
            <div id="star-results" style="margin-bottom: 20px; display: flex; gap: 20px; font-size: 20px; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 15px;">
    <div style="color: #ffffff;">★ <span id="count-white" style="color: white;">0</span></div>
    <div style="color: #facc15;">★ <span id="count-yellow" style="color: white;">0</span></div>
    <div style="color: #ef4444;">🌟 <span id="count-red" style="color: white;">0</span></div>
</div>

            <div style='display: flex; gap: 15px;'>
                <button id='retry-btn' class="btn-hover" style='padding: 12px 30px; background: #22c55e; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>CHƠI LẠI</button>
                <button id='exit-btn' class="btn-hover" style='padding: 12px 30px; background: #64748b; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>THOÁT</button>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>

</body>
</html>
