<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HELI-TOUCH GAME</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020617; font-family: sans-serif; }
        #game-wrapper-fullscreen { width: 100%; height: 100vh; position: relative; }
        #heli-touch { position: relative; width: 100%; height: 100%; background: #020617; overflow: hidden; touch-action: manipulation; user-select: none; }
        canvas { display: block; width: 100%; height: 100%; pointer-events: none; }
        
        /* Hiệu ứng Popup Sao */
        @keyframes starFade {
            0% { transform: scale(0.5) translate(-50%, -50%); opacity: 0; }
            20% { transform: scale(1.2) translate(-50%, -50%); opacity: 1; }
            80% { transform: scale(1) translate(-50%, -50%); opacity: 1; }
            100% { transform: scale(1.5) translate(-50%, -50%); opacity: 0; }
        }
        .star-popup {
            position: absolute; top: 40%; left: 50%; transform-origin: 0 0;
            font-size: 70px; pointer-events: none; z-index: 200;
            animation: starFade 3s forwards;
        }

        @keyframes blink { 50% { opacity: 0; } }
        :-webkit-full-screen #skyGame { width: 100vw; height: 100vh; }
        :fullscreen #skyGame { width: 100vw; height: 100vh; }
        .btn-hover { transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-hover:active { transform: scale(0.92); filter: brightness(1.2); }
        * { -webkit-tap-highlight-color: transparent; }

    /* Khung nền đen bao quanh popup - ĐÃ CẬP NHẬT */
#score-popup {
    display: none; 
    position: fixed; 
    inset: 0 !important;
    background: rgba(0,0,0,0.9); 
    z-index: 2147483647 !important; 
    justify-content: center; 
    align-items: center;
    pointer-events: auto !important; 
    touch-action: auto !important;
    overflow-y: auto; /* Cho phép cuộn toàn bộ popup nếu màn hình bị bàn phím che */
    padding: 10px;
}

/* Hộp thoại chứa nội dung nhập tên */
#score-popup > div {
    background: #1e293b; 
    padding: 15px 25px; /* Giảm padding một chút cho gọn */
    border-radius: 20px; 
    border: 2px solid #facc15; 
    width: 100%; 
    max-width: 300px; 
    text-align: center; 
    box-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
    margin: auto; /* Giữ hộp thoại luôn nằm giữa vùng cuộn */
}

/* Ép các thành phần bên trong popup phải nhận tương tác */
#score-popup *, #player-name, #cancel-score-btn, #submit-score-btn {
    pointer-events: auto !important;
    -webkit-user-select: text !important;
    user-select: text !important;
}

/* 🔥 ĐẶC BIỆT DÀNH CHO MÀN HÌNH NGANG THẤP (KHI BÀN PHÍM HIỆN LÊN) */
@media screen and (max-height: 280px) {
    #score-popup > div {
        padding: 10px 20px;
    }
    #score-popup h3 {
        margin: 2px 0 !important;
        font-size: 16px;
    }
    #score-popup p {
        margin-bottom: 5px !important;
        font-size: 12px;
    }
    #score-popup input {
        padding: 8px !important;
        margin-bottom: 10px !important;
        font-size: 14px;
    }
    #score-popup button {
        padding: 8px !important;
        font-size: 12px;
    }
}
  /* CHÈN THÊM: Lớp phủ cảnh báo xoay màn hình (Landscape)     */
   #orientation-warning {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999999999 !important; /* Đảm bảo nổi lên trên cùng mạng */
            color: white;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: sans-serif;
            padding: 20px;
        }

        .warning-box {
            animation: pulse 1.5s infinite;
        }

        .phone-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Khi màn hình dọc (Chiều cao > Chiều rộng): Hiện cảnh báo, ẩn game */
        @media screen and (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
            #game-wrapper-fullscreen {
                display: none !important;
            }
        }
    </style>
 </head>

        <p style="font-size: 18px; font-weight: bold; margin: 0 0 10px 0;">VUI LÒNG XOAY NGANG MÀN HÌNH</p>
        <p style="font-size: 14px; opacity: 0.7; margin: 0;">Để có trải nghiệm game tốt nhất</p>

            <p id='rotate-hint' style='margin-top: 15px; font-size: 12px; opacity: 0.6;'>Nên xoay ngang điện thoại để trải nghiệm tốt nhất</p>

        <div id='start-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 90; color: white;'>
            <button id='ready-btn' class="btn-hover" style='padding: 20px 60px; font-size: 24px; cursor: pointer; background: #22c55e; color: white; border-radius: 50px; border:none; font-weight: bold;'>BẮT ĐẦU NGAY</button>
            <p id='fly-hint' style='margin-top: 10px;'>Chạm và giữ để bay lên!</p>

        <div id='over-screen' style='position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 110; color: white;'>
            <h2 id='fail-title' style='color: #ef4444; margin-bottom: 5px;'>KẾT THÚC</h2>

             <div id='final-score' style='font-size: 36px; font-weight: bold; margin-bottom: 10px; color: #facc15;'>0m</div>
            
            <div id="star-results" style="margin-bottom: 20px; display: flex; gap: 20px; font-size: 20px; background: rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 15px;">
    <div style="color: #ffffff;">★ <span id="count-white" style="color: white;">0</span></div>

    <div style="color: #ef4444;">🌟 <span id="count-red" style="color: white;">0</span></div>
</div>

 <div style='display: flex; gap: 15px;'>
    <button id='save-score-trigger' class="btn-hover" style='padding: 12px 20px; background: #facc15; color: #000; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>LƯU ĐIỂM</button>
    <button id='retry-btn' class="btn-hover" style='padding: 12px 30px; background: #22c55e; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>CHƠI LẠI</button>
    <button id='exit-btn' class="btn-hover" style='padding: 12px 30px; background: #64748b; color: white; border:none; border-radius: 8px; font-weight:bold; cursor:pointer;'>THOÁT</button>
</div>

</style>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
//<![CDATA[
  // 1. Cấu hình Firebase
  const firebaseConfig = {
    databaseURL: "https://heli-best-score-default-rtdb.asia-southeast1.firebasedatabase.app",
  };
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // 2. Hàm mở/đóng Popup
  window.showScorePopup = function() {
    const finalScore = window.globalScore || 0;
    const popup = document.getElementById('score-popup');
    const scoreDisplay = document.getElementById('popup-score-text');
    const nameInput = document.getElementById('player-name');
    const btn = document.getElementById('submit-score-btn');
    
    if(popup) popup.style.display = 'flex';
    if(scoreDisplay) scoreDisplay.innerText = Math.floor(finalScore) + "m";
    
    if(nameInput) {
        nameInput.disabled = false; // Mở khóa ô nhập
        // Không xóa nameInput.value để người chơi không phải gõ lại tên nhiều lần
    }
    
    if(btn) {
        btn.disabled = false; // Mở khóa nút
        btn.innerText = "LƯU LẠI"; // Reset chữ trên nút
    }
};

  window.closeScorePopup = function() {
    const popup = document.getElementById('score-popup');
    if(popup) popup.style.display = 'none';
  };

  // 3. Hàm gửi điểm chính thức
  window.submitScore = function() {
    const nameInput = document.getElementById('player-name');
    const btn = document.getElementById('submit-score-btn');
    let finalScore = window.globalScore || 0;
    const name = nameInput.value.trim();
    
    if (!name) {
        alert("Bạn chưa nhập tên!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "ĐANG LƯU...";

    // Gửi dữ liệu lên Firebase
    const newScoreRef = database.ref('leaderboard').push();
    newScoreRef.set({
        name: name,
        score: Math.floor(finalScore),
        timestamp: Date.now()
    })
    .then(() => {
        // Tính toán thứ hạng ngay lập tức
        database.ref('leaderboard').once('value', (snapshot) => {
            let allScores = [];
            snapshot.forEach((child) => { allScores.push(child.val().score); });
            allScores.sort((a, b) => b - a);
            const rank = allScores.indexOf(Math.floor(finalScore)) + 1;

            if (rank <= 100) {
                alert(`TUYỆT VỜI! Bạn đứng thứ ${rank} thế giới!`);
            } else {
                alert(`Bạn xếp hạng thứ ${rank}. Cố gắng lọt Top 100 nhé!`);
            }

            btn.innerText = "ĐÃ LƯU #" + rank;
                        
            // Tự động đóng popup sau 1 giây để về màn hình kết quả
           setTimeout(() => {
        window.closeScorePopup();
        // Sau khi đóng, hãy reset lại chữ để lần sau mở lên không bị chữ "Đã lưu"
        btn.disabled = false;
        btn.innerText = "LƯU LẠI";
    }, 1000);
            if (typeof loadLeaderboard === "function") loadLeaderboard();
        });
    })
    .catch((err) => {
        alert("Lỗi: " + err.message);
        btn.disabled = false;
        btn.innerText = "THỬ LẠI";
    });
  };

  // 4. Hàm load bảng xếp hạng Sidebar
  function loadLeaderboard() {
    const leaderboardRef = database.ref('leaderboard').orderByChild('score').limitToLast(100);
    leaderboardRef.on('value', (snapshot) => {
        let data = [];
        snapshot.forEach((child) => { data.push(child.val()); });
        data.sort((a, b) => b.score - a.score);
        
        let html = '';
        data.forEach((entry, index) => {
            let displayName = entry.name.length > 12 ? entry.name.substring(0, 10) + '..' : entry.name;
            html += `
                <div class='lb-entry'>
                    <span class='lb-rank'>${index + 1}.</span>
                    <span class='lb-name'>${displayName}</span>
                    <span class='lb-score'>${Math.floor(entry.score)}m</span>
                </div>`;
        });
        const listDiv = document.getElementById('leaderboard-list');
        if(listDiv) listDiv.innerHTML = html || "<div style='text-align:center;font-size:10px;'>Chưa có dữ liệu</div>";
    });
  }

  // 5. Khởi tạo sự kiện
document.addEventListener('DOMContentLoaded', () => {
    loadLeaderboard();
    
/* CHÈN THÊM: Ép xoay màn hình ngang khi nhấn "VÀO CHƠI"    */
     const enterFsBtn = document.getElementById('enter-fs-btn');
    if (enterFsBtn) {
        const lockLandscape = () => {
            // 1. Kích hoạt Toàn màn hình trước (Bắt buộc phải có Fullscreen thì API xoay mới chạy)
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
            else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();

            // 2. Gọi lệnh khóa màn hình ngang
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch((err) => {
                    console.log("Trình duyệt không hỗ trợ tự khóa xoay: ", err);
                });
            }
        };

        // Gán sự kiện cho cả click và touch để nhạy trên mọi thiết bị
        enterFsBtn.addEventListener('click', lockLandscape);
        enterFsBtn.addEventListener('touchend', lockLandscape);
    }
    
    // 1. Xử lý nút mở Popup Lưu Điểm
    const saveTrigger = document.getElementById('save-score-trigger');
    if (saveTrigger) {
        const handleOpenPopup = (e) => {
            e.preventDefault(); // Ngăn chặn sự kiện mặc định
            e.stopPropagation(); // Ngăn sự kiện trôi xuống lớp Game bên dưới
            window.showScorePopup();
        };
        // Gán cả hai để chắc chắn chạy trên mọi thiết bị
        saveTrigger.onclick = handleOpenPopup;
        saveTrigger.ontouchend = handleOpenPopup;
    }
  // 3. Fix input mobile Android/iPhone
const nameInput = document.getElementById('player-name');

if (nameInput) {

    // Chặn game nhận touch
    ['touchstart', 'touchend', 'mousedown', 'mouseup', 'click'].forEach(evt => {
        nameInput.addEventListener(evt, (e) => {
            e.stopPropagation();
        }, { passive: true });
    });

    // Android Chrome cần focus bằng touchend
    nameInput.addEventListener('touchend', (e) => {
        e.preventDefault();

        nameInput.focus();

        // ép hiện keyboard Android
        setTimeout(() => {
            nameInput.click();
        }, 50);

    }, { passive: false });

}
    // 2. Xử lý nút Gửi điểm bên TRONG Popup
    const submitBtn = document.getElementById('submit-score-btn');
    if (submitBtn) {
        const handleSubmit = (e) => {
            e.preventDefault();
            e.stopPropagation();
            window.submitScore();
        };
        submitBtn.onclick = handleSubmit;
        submitBtn.ontouchend = handleSubmit;
    }
// Nút HỦY popup
const cancelBtn = document.getElementById('cancel-score-btn');

if (cancelBtn) {

    const handleCancel = (e) => {
        e.preventDefault();
        e.stopPropagation();

        window.closeScorePopup();
    };

    cancelBtn.onclick = handleCancel;
    cancelBtn.ontouchend = handleCancel;
}
       
});
//]]>
</script>
    
<script src="game.js"></script>

        <h3 style="color: #facc15; margin-top: 0;">LƯU KỶ LỤC</h3>

            <button id="submit-score-btn" style="flex: 1; padding: 12px; background: #facc15; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">LƯU LẠI</button>

</div>

</html>
